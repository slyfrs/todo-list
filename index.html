<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Список дел</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #fff0f6;
      --bg-alt: #e8f9ff;
      --surface: #ffffff;
      --text: #2a0a3d;
      --text-muted: #9b5de5;
      --accent: #ff2d95;
      --accent-2: #00c9ff;
      --accent-hover: #e6007a;
      --accent-soft: rgba(255, 45, 149, 0.18);
      --gradient: linear-gradient(135deg, #ff2d95 0%, #ff6b35 50%, #ffd23f 100%);
      --gradient-bg: linear-gradient(145deg, #fff0f6 0%, #f0e6ff 35%, #e0f7ff 70%, #fff9e6 100%);
      --danger: #ff3366;
      --danger-hover: #e6004c;
      --danger-soft: rgba(255, 51, 102, 0.15);
      --border: rgba(255, 45, 149, 0.15);
      --task-bg: linear-gradient(135deg, #fff5fb 0%, #f5f0ff 100%);
      --shadow-sm: 0 2px 12px rgba(255, 45, 149, 0.1);
      --shadow-md: 0 8px 28px rgba(155, 93, 229, 0.18);
      --shadow-lg: 0 16px 48px rgba(0, 201, 255, 0.15);
      --radius: 20px;
      --radius-sm: 12px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--gradient-bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 20px;
      line-height: 1.5;
    }

    .app {
      width: 100%;
      max-width: 520px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      border: 2px solid rgba(255, 255, 255, 0.8);
      padding: 24px;
      margin-bottom: 20px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .input-row input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }

    .input-row input::placeholder {
      color: var(--text-muted);
    }

    .input-row input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 14px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      white-space: nowrap;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--gradient);
      color: #fff;
      box-shadow: 0 4px 18px rgba(255, 45, 149, 0.45);
    }

    .btn-primary:hover {
      filter: brightness(1.08) saturate(1.1);
      box-shadow: 0 6px 24px rgba(255, 107, 53, 0.5);
      transform: scale(1.02);
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .stats strong {
      color: var(--text);
    }

    .btn-clear {
      background: transparent;
      color: var(--text-muted);
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: 500;
      border-radius: 8px;
    }

    .btn-clear:hover:not(:disabled) {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .btn-clear:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--task-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition), opacity var(--transition), transform var(--transition);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .task-item:hover {
      box-shadow: var(--shadow-md);
    }

    .task-item.done {
      opacity: 0.7;
      background: linear-gradient(135deg, #f0fff4 0%, #e8fff9 100%);
      border-color: rgba(0, 201, 255, 0.25);
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .checkbox {
      position: relative;
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .checkbox input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .checkbox-mark {
      display: block;
      width: 22px;
      height: 22px;
      border: 2px solid #ffb3d9;
      border-radius: 6px;
      background: var(--surface);
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
    }

    .checkbox input:checked + .checkbox-mark {
      background: var(--gradient);
      border-color: transparent;
    }

    .checkbox input:checked + .checkbox-mark::after {
      content: "";
      position: absolute;
      left: 7px;
      top: 3px;
      width: 6px;
      height: 11px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .checkbox:hover .checkbox-mark {
      border-color: var(--accent);
    }

    .task-text {
      flex: 1;
      font-size: 0.95rem;
      word-break: break-word;
      transition: color var(--transition);
    }

    .btn-delete {
      width: 34px;
      height: 34px;
      padding: 0;
      background: transparent;
      color: var(--text-muted);
      border-radius: 8px;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .btn-delete svg {
      width: 18px;
      height: 18px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 56px;
      height: 56px;
      margin-bottom: 16px;
      opacity: 0.35;
    }

    .empty-state p {
      font-size: 0.95rem;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Список дел</h1>
      <p>Организуйте задачи и отслеживайте прогресс</p>
    </header>

    <div class="card">
      <form class="input-row" id="task-form" autocomplete="off">
        <input
          type="text"
          id="task-input"
          placeholder="Новая задача..."
          maxlength="300"
          aria-label="Текст новой задачи"
        >
        <button type="submit" class="btn btn-primary">Добавить</button>
      </form>
    </div>

    <div class="card">
      <div class="stats">
        <span id="stats-text">Нет задач</span>
        <button type="button" class="btn btn-clear" id="clear-completed" disabled>
          Удалить выполненные
        </button>
      </div>

      <ul class="task-list" id="task-list" aria-label="Список задач"></ul>

      <div class="empty-state" id="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <p>Пока нет задач. Добавьте первую!</p>
      </div>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "todo-list-tasks";

    const form = document.getElementById("task-form");
    const input = document.getElementById("task-input");
    const list = document.getElementById("task-list");
    const emptyState = document.getElementById("empty-state");
    const statsText = document.getElementById("stats-text");
    const clearBtn = document.getElementById("clear-completed");

    let tasks = loadTasks();

    function loadTasks() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : [];
      } catch {
        return [];
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function updateStats() {
      const total = tasks.length;
      const done = tasks.filter((t) => t.done).length;
      const active = total - done;

      if (total === 0) {
        statsText.textContent = "Нет задач";
      } else if (done === total) {
        statsText.innerHTML = `Все <strong>${total}</strong> выполнены`;
      } else {
        statsText.innerHTML = `Активных: <strong>${active}</strong> · Выполнено: <strong>${done}</strong>`;
      }

      clearBtn.disabled = done === 0;
      emptyState.classList.toggle("hidden", total > 0);
      list.classList.toggle("hidden", total === 0);
    }

    function createTaskElement(task) {
      const li = document.createElement("li");
      li.className = "task-item" + (task.done ? " done" : "");
      li.dataset.id = task.id;

      li.innerHTML = `
        <label class="checkbox" title="Отметить выполненной">
          <input type="checkbox" ${task.done ? "checked" : ""} aria-label="Выполнена">
          <span class="checkbox-mark"></span>
        </label>
        <span class="task-text">${escapeHtml(task.text)}</span>
        <button type="button" class="btn btn-delete" title="Удалить" aria-label="Удалить задачу">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
      `;

      const checkbox = li.querySelector('input[type="checkbox"]');
      checkbox.addEventListener("change", () => toggleTask(task.id));

      li.querySelector(".btn-delete").addEventListener("click", () => deleteTask(task.id));

      return li;
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function render() {
      list.innerHTML = "";
      tasks.forEach((task) => list.appendChild(createTaskElement(task)));
      updateStats();
    }

    function addTask(text) {
      const trimmed = text.trim();
      if (!trimmed) return;

      tasks.unshift({
        id: generateId(),
        text: trimmed,
        done: false,
      });

      saveTasks();
      render();
    }

    function toggleTask(id) {
      const task = tasks.find((t) => t.id === id);
      if (!task) return;

      task.done = !task.done;
      saveTasks();
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter((t) => t.id !== id);
      saveTasks();
      render();
    }

    function clearCompleted() {
      tasks = tasks.filter((t) => !t.done);
      saveTasks();
      render();
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      addTask(input.value);
      input.value = "";
      input.focus();
    });

    clearBtn.addEventListener("click", clearCompleted);

    render();
    input.focus();
  </script>
</body>
</html>
